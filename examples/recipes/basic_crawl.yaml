# Basic Crawl Recipe
# Simple web crawling configuration

url: "https://example.com"
mode: http
max_depth: 3
max_pages: 100

output_path: "results.json"
output_format: json-pretty
state_file: "crawl.state"

timeout_secs: 30
max_concurrent_requests: 10
delay_ms: 100
max_retries: 3

follow_redirects: true
respect_robots_txt: true

include_patterns: []
exclude_patterns:
  - "\\.pdf$"
  - "\\.zip$"

css_selectors: []
headers: {}
