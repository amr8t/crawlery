# Documentation Crawl Recipe
# Optimized for documentation sites with URL filtering

url: "https://docs.example.com"
mode: http
max_depth: 5
max_pages: 500

output_path: "docs_crawl.json"
output_format: markdown
state_file: "docs_crawl.state"

timeout_secs: 30
max_concurrent_requests: 5
delay_ms: 500
max_retries: 3

follow_redirects: true
respect_robots_txt: true

# Only crawl documentation URLs
include_patterns:
  - "^https://docs\\.example\\.com/.*"
  - "^https://example\\.com/docs/.*"

# Skip non-content pages
exclude_patterns:
  - "\\.pdf$"
  - "\\.zip$"
  - "/login"
  - "/admin/"
  - "/blog/"
  - "\\?utm_"

# Extract clean content using readability algorithm (for RAG/LLM applications)
# Set to true for clean markdown-like content, false for raw HTML
# Documentation sites benefit from clean extraction for better RAG results
md_readability: true
headers: {}
